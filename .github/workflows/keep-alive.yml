name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    if: vars.ENABLE_GITHUB_ACTIONS == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run keep-alive script
        run: python main.py
        env:
          SUPABASE_KEY_1: ${{ secrets.SUPABASE_KEY_1 }}
          SUPABASE_KEY_2: ${{ secrets.SUPABASE_KEY_2 }}
          SUPABASE_KEY_3: ${{ secrets.SUPABASE_KEY_3 }}
          SUPABASE_KEY_4: ${{ secrets.SUPABASE_KEY_4 }}
          SUPABASE_KEY_5: ${{ secrets.SUPABASE_KEY_5 }}

      - name: Keep repo active (prevent GitHub Actions auto-disable)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last keep-alive run: $(date -u)" > last_run.txt
          git add last_run.txt
          git commit -m "chore: keep-alive run $(date -u '+%Y-%m-%d')"
          git push
